// ═══════════ 构建 DOM ═══════════
const sb=document.getElementById('sb'),tl=document.getElementById('tl');
DAYS.forEach((day,i)=>{
  const di=document.createElement('div');di.className='day';
  di.innerHTML=`<span class="n">D${day.d}</span><div class="t"><div class="rt">${day.title}</div><div class="mt">${day.date}·${day.km}km</div></div>`;
  di.onclick=()=>{if(mode==='day')pick(i)};sb.appendChild(di);day._el=di;
  const tc=document.createElement('div');tc.className='tc';
  tc.innerHTML=`<span class="tn">D${day.d}</span>${day.km}km`;
  tc.onclick=()=>{if(mode==='day')pick(i)};tl.appendChild(tc);day._tl=tc;
});
const dTitle=document.getElementById('dTitle'),dBody=document.getElementById('dBody');
const detail=document.getElementById('detail'),loading=document.getElementById('loading');
let cur=-1,mode='day',map,fullLine,dayOv=[],allOv=[],infoWin=null;

function pick(i){
  if(mode!=='day')return;
  if(i===cur)return;
  if(cur>=0){DAYS[cur]._el.classList.remove('on');DAYS[cur]._tl.classList.remove('on');if(dayOv[cur])dayOv[cur].forEach(o=>o.hide())}
  cur=i;const day=DAYS[i];
  day._el.classList.add('on');day._tl.classList.add('on');
  let html='';
  if(day.spots.length){
    html+='<div class="sec"><div class="secl">🏖️ 景点</div>';
    day.spots.forEach(sn=>{
      const s=SPOTS[sn];if(!s)return;
      html+=`<div class="spot-card"><img class="sp-img" src="images/${sn.replace(/[()（）]/g,'')}.jpg" alt="${sn}" loading="lazy"><div class="sp-info"><div class="sp-name">${sn}</div><div class="sp-desc">${s.d}</div></div></div>`;
    });
    html+='</div>';
  }
  const rCity=day.stay;
  if(RESTO[rCity]&&day.spots.length){
    const r=RESTO[rCity];
    html+=`<div class="sec"><div class="secl">🍽️ 百度推荐 · ${rCity}</div><div class="sr"><span>⭐${r.rating}</span><span><b>${r.name}</b> 人均¥${r.price} ${r.tag}</span></div></div>`;
  }
  html+=day.items.map(it=>`<div class="dr"><span class="ic">${it.i}</span><span class="tx">${it.t}</span></div>`).join('');
  if(day.svc.length){
    html+='<div class="sec"><div class="secl">⛽ 服务区（均有⚡充电桩）</div>';
    day.svc.forEach(s=>{const sv=SVCS[s.n];html+=`<div class="sr"><span>⛽</span><span><b>${s.n}</b> ~${s.k}km ${sv?sv.n:''}</span></div>`});
    html+='</div>';
  }
  dTitle.textContent=day.title+' · '+day.date;dBody.innerHTML=html;
  if(!map)return;
  if(dayOv[i])dayOv[i].forEach(o=>o.show());
  if(infoWin)map.removeOverlay(infoWin);
  const pts=day.r.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
  if(day.spots)day.spots.forEach(sn=>{const s=SPOTS[sn];if(s&&s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
  if(day.svc)day.svc.forEach(sv=>{const s=SVCS[sv.n];if(s&&s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
  const w=window.innerWidth,rm=w<440?10:w<640?120:280;
  map.setViewport(pts,{margins:[50,rm,50,50]});
}

function setMode(m){
  mode=m;
  document.getElementById('btnDay').classList.toggle('on',m==='day');
  document.getElementById('btnFull').classList.toggle('on',m==='full');
  if(m==='full'){
    sb.classList.add('hide');detail.classList.add('hide');
    if(dayOv[cur])dayOv[cur].forEach(o=>o.hide());
    allOv.forEach(o=>o.show());
    if(infoWin)map.removeOverlay(infoWin);
    const fr=['岳池','荆州','日照','烟台','威海','荣成','乳山','海阳','即墨','青岛','日照','襄阳','岳池'];
    const pts=fr.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
    map.setViewport(pts,{margins:[30,30,30,30]});
  }else{
    sb.classList.remove('hide');detail.classList.remove('hide');
    allOv.forEach(o=>o.hide());
    if(cur>=0)pick(cur);
  }
}

// ═══════════ 地图初始化 ═══════════
function initMap(){
  loading.classList.add('done');
  map=new BMapGL.Map('map');map.enableScrollWheelZoom(true);
  map.setMaxZoom(18);map.setMinZoom(5);
  map.addControl(new BMapGL.NavigationControl({anchor:BMAP_ANCHOR_TOP_LEFT,type:BMAP_NAVIGATION_CONTROL_SMALL}));
  
  const fr=['岳池','荆州','日照','烟台','威海','荣成','乳山','海阳','即墨','青岛','日照','襄阳','岳池'];
  fullLine=new BMapGL.Polyline(fr.map(n=>new BMapGL.Point(CT[n][0],CT[n][1])),{strokeColor:'#555',strokeWeight:1.5,strokeOpacity:.3});
  map.addOverlay(fullLine);
  
  // 预创建所有overlay (skill: 显隐切换，不create/destroy)
  const dayColors=['#f0c060','#f39c12','#e67e22','#d35400','#e74c3c','#c0392b','#f1c40f','#2ecc71','#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad','#34495e','#2c3e50'];
  DAYS.forEach((day,i)=>{
    const ovs=[];
    if(day.r.length>=2){
      const pts=day.r.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
      const line=new BMapGL.Polyline(pts,{strokeColor:'#f0c060',strokeWeight:5,strokeOpacity:.92});
      map.addOverlay(line);line.hide();ovs.push(line);
      const lineF=new BMapGL.Polyline(pts,{strokeColor:dayColors[i],strokeWeight:3,strokeOpacity:.7});
      map.addOverlay(lineF);lineF.hide();allOv.push(lineF);
      const s=new BMapGL.Label('▶ '+day.r[0],{position:new BMapGL.Point(CT[day.r[0]][0],CT[day.r[0]][1]),offset:new BMapGL.Size(0,-20)});
      s.setStyle({background:'#f0c060',color:'#111',padding:'2px 6px',borderRadius:'8px',fontSize:'9px',fontWeight:'700',border:'2px solid #fff',whiteSpace:'nowrap'});
      map.addOverlay(s);s.hide();ovs.push(s);
      const e=new BMapGL.Label('⏹ '+day.r[day.r.length-1],{position:new BMapGL.Point(CT[day.r[day.r.length-1]][0],CT[day.r[day.r.length-1]][1]),offset:new BMapGL.Size(0,-20)});
      e.setStyle({background:'#e74c3c',color:'#fff',padding:'2px 6px',borderRadius:'8px',fontSize:'9px',fontWeight:'700',border:'2px solid #fff',whiteSpace:'nowrap'});
      map.addOverlay(e);e.hide();ovs.push(e);
    }
    if(day.spots)day.spots.forEach(sn=>{
      const s=SPOTS[sn];if(!s||!s.p)return;
      const l=new BMapGL.Label('● '+sn,{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,-12)});
      l.setStyle({background:'rgba(240,192,96,.88)',color:'#111',padding:'1px 5px',borderRadius:'6px',fontSize:'8px',fontWeight:'600',border:'1px solid rgba(255,255,255,.5)',whiteSpace:'nowrap',cursor:'pointer'});
      map.addOverlay(l);l.hide();ovs.push(l);
      const lf=new BMapGL.Label('●',{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,0)});
      lf.setStyle({background:'#f0c060',width:'5px',height:'5px',borderRadius:'50%',border:'1.5px solid #fff',padding:'0'});
      map.addOverlay(lf);lf.hide();allOv.push(lf);
    });
    if(day.svc)day.svc.forEach(sv=>{
      const s=SVCS[sv.n];if(!s||!s.p)return;
      const l=new BMapGL.Label('⛽ '+sv.n,{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,-6)});
      l.setStyle({background:'hsl(var(--blue))',color:'#fff',padding:'0 4px',borderRadius:'4px',fontSize:'7px',border:'1px solid rgba(255,255,255,.3)',whiteSpace:'nowrap'});
      map.addOverlay(l);l.hide();ovs.push(l);allOv.push(l);
    });
    dayOv[i]=ovs;
  });
  
  pick(0);
}

// ═══════════ 加载流程 ═══════════
var _bmapReady=false,_bmapWait=0;
function waitBMapGL(){
  if(typeof BMapGL!=='undefined'){_bmapReady=true;initMap();return}
  _bmapWait++;
  if(_bmapWait>150){loading.innerHTML='<div style=color:#e74c3c>⚠️ 地图加载超时<br><small>请刷新重试</small></div>';return}
  setTimeout(waitBMapGL,100);
}

document.addEventListener('keydown',e=>{
  if(mode!=='day')return;
  if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();pick(Math.min(cur+1,15))}
  if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();pick(Math.max(cur-1,0))}
  if(e.key==='Home'){e.preventDefault();pick(0)}if(e.key==='End'){e.preventDefault();pick(15)}
