const PI=Math.PI,X_PI=PI*3000/180,A=6378245,EE=0.00669342162296594323;
function _tL(x,y){let r=-100+2*x+3*y+.2*y*y+.1*x*y+.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(y*PI)+40*Math.sin(y/3*PI))*2/3;r+=(160*Math.sin(y/12*PI)+320*Math.sin(y*PI/30))*2/3;return r}
function _tG(x,y){let r=300+x+2*y+.1*x*x+.1*x*y+.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*PI)+20*Math.sin(2*x*PI))*2/3;r+=(20*Math.sin(x*PI)+40*Math.sin(x/3*PI))*2/3;r+=(150*Math.sin(x/12*PI)+300*Math.sin(x/30*PI))*2/3;return r}
function w2g(lng,lat){let dL=_tL(lng-105,lat-35),dG=_tG(lng-105,lat-35),r=lat/180*PI,m=Math.sin(r);m=1-EE*m*m;let s=Math.sqrt(m);dL=dL*180/((A*(1-EE))/(m*s)*PI);dG=dG*180/(A/s*Math.cos(r)*PI);return[lng+dG,lat+dL]}
function g2b(lng,lat){let z=Math.sqrt(lng*lng+lat*lat)+2e-5*Math.sin(lat*X_PI),t=Math.atan2(lat,lng)+3e-6*Math.cos(lng*X_PI);return[z*Math.cos(t)+.0065,z*Math.sin(t)+.006]}
function toBD(lng,lat){const g=w2g(lng,lat);return g2b(g[0],g[1])}

function imgUrl(name){var k=name.replace(/[()（）]/g,'')+'.jpg';return _IMG[k]||_IMG['刘公岛.jpg']}
function fbImg(n){return imgUrl(n)} // 本地图不会404，但保留兜底

function showSpotInfo(name,lng,lat){
  const s=SPOTS[name];if(!s)return;
  if(infoWin)map.removeOverlay(infoWin);
  const t=s.bk||name;
  const html=`<div class="iw-body"><h4>${name}</h4><p>${s.d}</p><img src="${imgUrl(name)}" alt="${name}"/><br><a href="${baikeUrl(t)}" target="_blank">📖 百度百科 →</a></div>`;
  infoWin=new BMapGL.InfoWindow(html,{width:260,title:''});
  map.openInfoWindow(infoWin,new BMapGL.Point(lng,lat));
}

function setMode(m){
  mode=m;
  document.getElementById('btnDay').classList.toggle('on',m==='day');
  document.getElementById('btnFull').classList.toggle('on',m==='full');
  
  if(m==='full'){
    sb.classList.add('hide');detail.classList.add('hide');
    hint.textContent='🌐 全图模式 · 滚轮缩放 · 点标签看详情';
    // 隐藏日间覆盖，显示全量
    if(dayOv[cur])dayOv[cur].forEach(o=>o.hide());
    allOv.forEach(o=>o.show());
    if(infoWin)map.removeOverlay(infoWin);
    const fr=['岳池','荆州','日照','烟台','威海','荣成','乳山','海阳','即墨','青岛','日照','襄阳','岳池'];
    const pts=fr.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
    // 纳入所有spot
    Object.values(SPOTS).forEach(s=>{if(s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
    Object.values(SVCS).forEach(s=>{if(s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
    map.setViewport(pts,{margins:[30,30,30,30]});
  }else{
    sb.classList.remove('hide');detail.classList.remove('hide');
    hint.textContent='↑↓/jk 切日期 · 点标签看详情 · 双击百科';
    allOv.forEach(o=>o.hide());
    if(cur>=0)pick(cur);
  }
}

function pick(i){
  if(mode!=='day')return;
  if(i===cur)return;
  if(cur>=0){DAYS[cur]._el.classList.remove('on');DAYS[cur]._tl.classList.remove('on');if(dayOv[cur])dayOv[cur].forEach(o=>o.hide())}
  cur=i;const day=DAYS[i];
  day._el.classList.add('on');day._tl.classList.add('on');
  day._el.scrollIntoView({block:'nearest'});day._tl.scrollIntoView({block:'nearest',inline:'center'});
  let html='';
  if(day.restaurants){{
    html+='<div class="sec"><div class="secl">🍽️ 百度地图推荐餐厅</div>';
    day.restaurants.forEach(r=>{{html+=`<div class="sr"><span>⭐${{r.rating}}</span><span><b>${{r.name}}</b> 人均¥${{r.price}} ${{r.tag}}</span></div>`}});
    html+='</div>';
  }}

  if(day.spots.length){
    html+='<div class="sec"><div class="secl">🏖️ 景点（单击看地图 / 双击百科）</div>';
    day.spots.forEach(sn=>{
      const s=SPOTS[sn];if(!s)return;
      html+=`<div class="spot-card" onclick="showSpotInfo('${sn}',${s.p[0]},${s.p[1]})" ondblclick="window.open('${baikeUrl(s.bk||sn)}','_blank')"><img class="sp-img" src="${imgUrl(sn)}" alt="${sn}" loading="lazy"><div class="sp-info"><div class="sp-name">${sn}</div><div class="sp-desc">${s.d}</div><span class="sp-link">📖 百度百科</span></div></div>`;
    });
    html+='</div>';
  }
  html+=day.items.map(it=>`<div class="dr"><span class="ic">${it.i}</span><span class="tx">${it.t}</span></div>`).join('');
  if(day.svc.length){
    html+='<div class="sec"><div class="secl">⛽ 服务区 <span class="chg">（⚡=有充电桩）</span></div>';
    day.svc.forEach(s=>{const sv=SVCS[s.n];html+=`<div class="sr"><span>⛽${sv&&sv.c?'<span class="chg">⚡</span>':''}</span><span><b>${s.n}</b> ~${s.k}km ${sv?sv.n:''}</span></div>`});
    html+='</div>';
  }
  dTitle.textContent=day.title+' · '+day.date;dBody.innerHTML=html;
  if(!map)return;
  if(infoWin)map.removeOverlay(infoWin);
  if(dayOv[i])dayOv[i].forEach(o=>o.show());
  const pts=day.r.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
  if(day.spots)day.spots.forEach(sn=>{const s=SPOTS[sn];if(s&&s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
  if(day.svc)day.svc.forEach(sv=>{const s=SVCS[sv.n];if(s&&s.p)pts.push(new BMapGL.Point(s.p[0],s.p[1]))});
  const w=window.innerWidth;
  const rightMargin=w<440?10:w<640?120:280;
  map.setViewport(pts,{margins:[50,rightMargin,50,50]});
}

// ══ 地图 ══
function go(){
  if(!_bmapReady||typeof BMapGL==='undefined'){setTimeout(go,100);return}
  document.getElementById('loading').classList.add('done');
  map=new BMapGL.Map('map');map.enableScrollWheelZoom(true);
  map.setMaxZoom(18);map.setMinZoom(5);
  map.addControl(new BMapGL.NavigationControl({anchor:BMAP_ANCHOR_TOP_LEFT,type:BMAP_NAVIGATION_CONTROL_SMALL}));

  const fr=['岳池','荆州','日照','烟台','威海','荣成','乳山','海阳','即墨','青岛','日照','襄阳','岳池'];
  fullLine=new BMapGL.Polyline(fr.map(n=>new BMapGL.Point(CT[n][0],CT[n][1])),{strokeColor:'#444',strokeWeight:1.5,strokeOpacity:.3});
  map.addOverlay(fullLine);

  // 预创建逐日overlay
  const dayColors=['#f0c060','#f39c12','#e67e22','#d35400','#e74c3c','#c0392b','#f1c40f','#2ecc71','#27ae60','#1abc9c','#3498db','#2980b9','#9b59b6','#8e44ad','#34495e','#2c3e50'];
  DAYS.forEach((day,i)=>{
    const ovs=[];
    if(day.r.length>=2){
      const pts=day.r.map(n=>new BMapGL.Point(CT[n][0],CT[n][1]));
      const line=new BMapGL.Polyline(pts,{strokeColor:'#f0c060',strokeWeight:5,strokeOpacity:.92});
      map.addOverlay(line);line.hide();ovs.push(line);
      // 全图模式用的不同颜色路线
      const lineFull=new BMapGL.Polyline(pts,{strokeColor:dayColors[i],strokeWeight:3,strokeOpacity:.7});
      map.addOverlay(lineFull);lineFull.hide();allOv.push(lineFull);
      const s=new BMapGL.Label('▶ '+day.r[0],{position:new BMapGL.Point(CT[day.r[0]][0],CT[day.r[0]][1]),offset:new BMapGL.Size(0,-20)});
      s.setStyle({background:'#f0c060',color:'#111',padding:'2px 6px',borderRadius:'8px',fontSize:'9px',fontWeight:'700',border:'2px solid #fff',whiteSpace:'nowrap'});
      map.addOverlay(s);s.hide();ovs.push(s);
      const e=new BMapGL.Label('⏹ '+day.r[day.r.length-1],{position:new BMapGL.Point(CT[day.r[day.r.length-1]][0],CT[day.r[day.r.length-1]][1]),offset:new BMapGL.Size(0,-20)});
      e.setStyle({background:'#e74c3c',color:'#fff',padding:'2px 6px',borderRadius:'8px',fontSize:'9px',fontWeight:'700',border:'2px solid #fff',whiteSpace:'nowrap'});
      map.addOverlay(e);e.hide();ovs.push(e);
    }
    if(day.spots)day.spots.forEach(sn=>{
      const s=SPOTS[sn];if(!s||!s.p)return;
      const l=new BMapGL.Label('● '+sn,{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,-12)});
      l.setStyle({background:'rgba(240,192,96,.88)',color:'#111',padding:'1px 5px',borderRadius:'6px',fontSize:'8px',fontWeight:'600',border:'1px solid rgba(255,255,255,.5)',whiteSpace:'nowrap',cursor:'pointer'});
      l.addEventListener('click',()=>showSpotInfo(sn,s.p[0],s.p[1]));
      map.addOverlay(l);l.hide();ovs.push(l);
      // 全图用的淡色标签
      const lf=new BMapGL.Label('●',{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,0)});
      lf.setStyle({background:'#f0c060',width:'5px',height:'5px',borderRadius:'50%',border:'1.5px solid #fff',padding:'0'});
      lf.addEventListener('click',()=>showSpotInfo(sn,s.p[0],s.p[1]));
      map.addOverlay(lf);lf.hide();allOv.push(lf);s._label=lf;
    });
    if(day.svc)day.svc.forEach(sv=>{
      const s=SVCS[sv.n];if(!s||!s.p)return;
      const l=new BMapGL.Label((s.c?'⚡':'⛽')+' '+sv.n,{position:new BMapGL.Point(s.p[0],s.p[1]),offset:new BMapGL.Size(0,-6)});
      l.setStyle({background:s.c?'hsl(var(--charge))':'hsl(var(--blue))',color:'#fff',padding:'0 4px',borderRadius:'4px',fontSize:'7px',border:'1px solid rgba(255,255,255,.3)',whiteSpace:'nowrap'});
      map.addOverlay(l);l.hide();ovs.push(l);allOv.push(l);
    });
    dayOv[i]=ovs;
  });

  ['荆州','日照','烟台','威海','荣成','乳山','即墨','襄阳'].forEach(n=>{
    if(!CT[n])return;
    const l=new BMapGL.Label('●',{position:new BMapGL.Point(CT[n][0],CT[n][1]),offset:new BMapGL.Size(0,2)});
    l.setStyle({background:'transparent',color:'#555',padding:'0',border:'none',fontSize:'7px'});map.addOverlay(l);
  });

  pick(0);

  // ══ 坐标校准 ══
  gcStatus.textContent='📍 校准中…';
  const geocoder=new BMapGL.Geocoder();
  const names=Object.keys(SPOTS);let idx=0;
  function calNext(){
    if(idx>=names.length){gcStatus.textContent=`📍 已校准 ${calibrated}/${names.length}`;return}
    const name=names[idx];idx++;const spot=SPOTS[name];
    geocoder.getPoint(spot.bk||name,function(pt){
      if(pt){spot.p=[pt.lng,pt.lat];calibrated++}
      gcStatus.textContent=`📍 校准中 ${idx}/${names.length}…`;
      setTimeout(calNext,200);
    },name);
  }
  setTimeout(calNext,500);
}
go();

document.addEventListener('keydown',e=>{
  if(mode!=='day')return;
  if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();pick(Math.min(cur+1,15))}
  if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();pick(Math.max(cur-1,0))}
  if(e.key==='Home'){e.preventDefault();pick(0)}if(e.key==='End'){e.preventDefault();pick(15)}
});
</script><script>
var _bmapReady=false,_bmapWait=0;
function _bmapErr(){document.getElementById('loading').innerHTML='<div style=color:#e74c3c>❌ 百度地图脚本加载失败</div>'}
function _bmapTimeout(){document.getElementById('loading').innerHTML='<div style=color:#e74c3c>⚠️ 地图加载超时<br><small>请检查网络或刷新重试</small></div>'}
function waitBMapGL(){
  if(typeof BMapGL!=='undefined'){_bmapReady=true;return}
  _bmapWait++;
  if(_bmapWait>150){_bmapTimeout();return}
  setTimeout(waitBMapGL,100);
}
</script>
<script src="https://api.map.baidu.com/getscript?type=webgl&v=1.0&ak=ubkl27mPSYPfN2BuP8Rnk5xod9cvHJ6p&services=" onload="waitBMapGL()" onerror="_bmapErr()"></script>
